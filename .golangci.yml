version: "2"

linters:
  enable:
    # Type safety
    - forcetypeassert
    - unconvert
    - asasalint

    # Error handling
    - errorlint
    - errchkjson

    # Bug prevention
    - gocritic
    - gosec
    - durationcheck
    - exhaustive
    - fatcontext
    - copyloopvar

    # Resource & network safety
    - sqlclosecheck
    - bodyclose
    - nilerr

    # Code quality
    - goconst
    - dupword
    - asciicheck
    - revive

  settings:
    exhaustive:
      default-signifies-exhaustive: true

    goconst:
      min-occurrences: 5
      ignore-tests: true

    revive:
      enable-default-rules: true
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true

    gocritic:
      enable-all: true
      disabled-tags:
        - experimental
        - opinionated
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - ifElseChain
        - singleCaseSwitch

  exclusions:
    rules:
      # staticcheck nil-after-Fatal false positives in tests
      - linters: [staticcheck]
        path: _test\.go
        text: "SA5011"
